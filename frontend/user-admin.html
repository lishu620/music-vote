<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 min-h-screen p-6">
<div class="max-w-6xl mx-auto">
    <div class="flex justify-between mb-4">
        <h1 class="text-2xl font-bold">用户管理（仅管理员）</h1>
        <div class="flex gap-2">
            <button onclick="openAddModal()" class="bg-green-600 text-white px-3 py-2 rounded">添加账号</button>
            <button onclick="location.href='index.html'" class="bg-gray-600 text-white px-3 py-2 rounded">返回首页</button>
        </div>
    </div>

    <div class="bg-white rounded-xl p-6 shadow">
        <table class="w-full">
            <thead>
                <tr class="border-b">
                    <th class="p-2 text-left">ID</th>
                    <th class="p-2 text-left">用户名</th>
                    <th class="p-2 text-left">昵称</th>
                    <th class="p-2 text-left">角色</th>
                    <th class="p-2 text-left">状态</th>
                    <th class="p-2 text-left">操作</th>
                </tr>
            </thead>
            <tbody id="userList"></tbody>
        </table>
    </div>
</div>

<!-- 添加账号弹窗 -->
<div id="addModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center">
    <div class="bg-white w-full max-w-md rounded-xl p-6 shadow-lg">
        <h2 class="text-xl font-bold mb-4">添加新账号</h2>
        <input id="add_username" placeholder="用户名" class="w-full border p-2 rounded my-2">
        <input id="add_nickname" placeholder="昵称" class="w-full border p-2 rounded my-2">
        <select id="add_role" class="w-full border p-2 rounded my-2">
            <option value="文案">文案</option>
            <option value="管理">管理</option>
            <option value="播音">播音</option>
            <option value="剪辑">剪辑</option>
            <option value="美术">美术</option>
            <option value="其他">其他</option>
        </select>
        <div class="text-gray-500 text-sm mb-4">默认密码：admin@123</div>
        <div class="flex gap-2">
            <button onclick="addUser()" class="flex-1 bg-green-600 text-white p-2 rounded">确认添加</button>
            <button onclick="closeAddModal()" class="flex-1 bg-gray-600 text-white p-2 rounded">取消</button>
        </div>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    checkLogin();
    const user = getUser();
    if (user.role !== '管理') { alert('无权限'); location.href='index.html'; }

    loadUsers();
    async function loadUsers() {
        const list = await request('/auth/all');
        let html = '';
        list.forEach(u => {
            html += `
            <tr class="border-b p-2">
                <td class="p-2">${u.id}</td>
                <td class="p-2">${u.username}</td>
                <td class="p-2"><input id="nk_${u.id}" value="${u.nickname}" class="border p-1"></td>
                <td class="p-2">
                    <select id="role_${u.id}" class="border p-1">
                        <option value="文案" ${u.role=='文案'?'selected':''}>文案</option>
                        <option value="管理" ${u.role=='管理'?'selected':''}>管理</option>
                        <option value="播音" ${u.role=='播音'?'selected':''}>播音</option>
                        <option value="剪辑" ${u.role=='剪辑'?'selected':''}>剪辑</option>
                        <option value="美术" ${u.role=='美术'?'selected':''}>美术</option>
                        <option value="其他" ${u.role=='其他'?'selected':''}>其他</option>
                    </select>
                </td>
                <td class="p-2">
                    <span class="${u.status === 'active' ? 'text-green-600' : 'text-orange-600'}">
                        ${u.status === 'active' ? '已启用' : '待审核'}
                    </span>
                </td>
                <td class="p-2 flex gap-2 flex-wrap">
                    <button onclick="update(${u.id})" class="bg-blue-600 text-white px-2 py-1 rounded">保存</button>
                    ${u.status === 'pending' ? 
                        `<button onclick="approve(${u.id})" class="bg-green-600 text-white px-2 py-1 rounded">审核</button>` 
                        : ''}
                    <button onclick="resetPwd(${u.id})" class="bg-orange-600 text-white px-2 py-1 rounded">重置密码</button>
                </td>
            </tr>`;
        });
        document.getElementById('userList').innerHTML = html;
    }

    async function update(id) {
        const nickname = document.getElementById(`nk_${id}`).value;
        const role = document.getElementById(`role_${id}`).value;
        const res = await request('/auth/admin/update', {
            method: 'POST', body: JSON.stringify({ id, nickname, role })
        });
        alert(res.msg);
    }

    // 审核用户
    async function approve(id) {
        if (!confirm('确定审核通过并启用该账号吗？')) return;
        const res = await request('/auth/admin/approve', {
            method: 'POST', body: JSON.stringify({ id })
        });
        alert(res.msg);
        loadUsers();
    }

    async function resetPwd(id) {
        if (!confirm('确定重置为 admin@123？')) return;
        const res = await request('/auth/reset-pwd', {
            method: 'POST', body: JSON.stringify({ id })
        });
        alert(res.msg);
    }

    function openAddModal() {
        document.getElementById('addModal').classList.remove('hidden');
    }
    function closeAddModal() {
        document.getElementById('addModal').classList.add('hidden');
    }
    async function addUser() {
        const username = document.getElementById('add_username').value.trim();
        const nickname = document.getElementById('add_nickname').value.trim();
        const role = document.getElementById('add_role').value;

        if (!username || !nickname) {
            alert('请填写用户名和昵称！');
            return;
        }

        const res = await request('/auth/admin/add', {
            method: 'POST',
            body: JSON.stringify({ username, nickname, role })
        });

        alert(res.msg);
        if (res.msg.includes('成功')) {
            closeAddModal();
            loadUsers();
        }
    }
</script>
</body>
</html>
