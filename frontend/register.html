<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
    <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6">注册</h2>
    <input id="username" placeholder="用户名" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-3">
    <input type="password" id="password" placeholder="密码" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-3">
    <input id="nickname" placeholder="请输入昵称" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-3">
    <select id="role" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-5">
        <option value="文案">文案</option>
        <option value="管理">管理</option>
        <option value="播音">播音</option>
        <option value="剪辑">美术</option>
        <option value="其他">其他</option>
    </select>
    <button onclick="register()" class="w-full bg-indigo-600 text-white py-3 rounded-lg">注册</button>
    <button onclick="location.href='login.html'" class="w-full mt-3 text-gray-500">去登录</button>
</div>

<script src="js/common.js"></script>
<script>
    async function register() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const nickname = document.getElementById('nickname').value;
        const role = document.getElementById('role').value;

        if (!username || !password || !nickname) {
            alert("请填写完整信息");
            return;
        }

        const res = await request('/auth/register', {
            method: 'POST',
            body: JSON.stringify({ username, password, nickname, role })
        });
        alert(res.msg);
        if (res.msg === '注册成功') location.href = 'login.html';
    }
</script>
</body>
</html>
