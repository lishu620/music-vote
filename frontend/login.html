<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 音乐推荐投票平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">
        <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6">登录</h2>
        <input id="username" placeholder="用户名" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-3 outline-none focus:ring-2 focus:ring-indigo-400">
        <input type="password" id="password" placeholder="密码" class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-5 outline-none focus:ring-2 focus:ring-indigo-400">
        <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">登录</button>
        <button onclick="location.href='register.html'" class="w-full mt-3 text-gray-500">没有账号？去注册</button>
    </div>

    <script src="js/common.js"></script>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await request('/auth/login', { method: 'POST', body: JSON.stringify({ username, password }) });
            if (res.token) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                location.href = 'index.html';
            } else {
                alert(res.msg);
            }
        }
    </script>
</body>
</html>
