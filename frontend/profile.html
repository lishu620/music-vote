<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 min-h-screen p-6">
<div class="max-w-md mx-auto bg-white rounded-xl p-6 shadow">
    <h1 class="text-xl font-bold mb-4">个人中心</h1>
    <div class="my-2">用户名：{{user.username}}</div>
    <div class="my-2">昵称：{{user.nickname}}</div>
    <div class="my-2">角色：{{user.role}}</div>
    <hr class="my-4">

    <h3 class="font-semibold text-gray-700 mb-2">修改昵称</h3>
    <input id="nickname" placeholder="请输入新昵称" type="text" class="w-full border p-2 rounded my-2">
    <button onclick="updateNickname()" class="bg-green-600 text-white w-full p-2 rounded mb-6">修改昵称</button>

    <h3 class="font-semibold text-gray-700 mb-2">修改密码</h3>
    <input id="oldPwd" placeholder="原密码" type="password" class="w-full border p-2 rounded my-2">
    <input id="newPwd" placeholder="新密码" type="password" class="w-full border p-2 rounded my-2">
    <button onclick="updatePwd()" class="bg-blue-600 text-white w-full p-2 rounded">修改密码</button>
    
    <button onclick="location.href='index.html'" class="mt-3 w-full p-2 rounded border">返回首页</button>
</div>

<script src="js/common.js"></script>
<script>
    checkLogin();
    const user = getUser();
    document.body.innerHTML = document.body.innerHTML.replaceAll('{{user.username}}', user.username);
    document.body.innerHTML = document.body.innerHTML.replaceAll('{{user.nickname}}', user.nickname);
    document.body.innerHTML = document.body.innerHTML.replaceAll('{{user.role}}', user.role);

    async function updateNickname() {
        const nickname = document.getElementById('nickname').value.trim();
        if (!nickname) {
            alert('昵称不能为空！');
            return;
        }
        const res = await request('/auth/update-nickname', {
            method: 'POST',
            body: JSON.stringify({ nickname })
        });
        alert(res.msg);
        if (res.msg === '昵称修改成功') {
            localStorage.setItem('user', JSON.stringify({...user, nickname}));
            location.reload();
        }
    }

    async function updatePwd() {
        const oldPwd = document.getElementById('oldPwd').value;
        const newPwd = document.getElementById('newPwd').value;
        const res = await request('/auth/update-pwd', {
            method: 'POST', body: JSON.stringify({ oldPwd, newPwd })
        });
        alert(res.msg);
    }
</script>
</body>
</html>
