<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投票播放页</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-purple-50 min-h-screen p-4 md:p-8" onload="loadData()">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">🎵 歌曲推荐 & 投票</h1>
            <button onclick="location.href='index.html'" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">返回期次</button>
        </div>

        <div id="songList" class="grid gap-6 grid-cols-1 lg:grid-cols-2"></div>
    </div>

    <script src="js/common.js"></script>
    <script>
        checkLogin();
        const params = new URLSearchParams(location.search);
        const episodeId = params.get('id');
        const user = getUser();
        const maxVote = user.role === '文案' ? 1 : 3;

        // 解析 B站链接/短链/BV号
        function parseBilibiliLink(link) {
            const bvRegex = /(BV[a-zA-Z0-9]+)|b23\.tv\/([a-zA-Z0-9]+)/;
            const match = link.match(bvRegex);
            if (match) {
                return match[1] || match[2];
            }
            return null;
        }

        // 解析网易云链接（提取 song id）
        function parseNeteaseLink(link) {
            const idRegex = /song\?id=(\d+)/;
            const match = link.match(idRegex);
            if (match) {
                return match[1];
            }
            return null;
        }

        async function loadData() {
            const list = await request(`/recommend/list/${episodeId}`);
            let html = '';

            // 先把所有歌曲的 HTML 拼好，不等待投票接口
            list.forEach(song => {
                let player = '';
                if (song.type === 'bilibili') {
                    const bv = parseBilibiliLink(song.link);
                    if (bv) {
                        player = `
                        <iframe 
                            src="https://player.bilibili.com/player.html?bvid=${bv}&autoplay=0" 
                            width="100%" 
                            height="220" 
                            frameborder="no" 
                            scrolling="no" 
                            allowfullscreen>
                        </iframe>`;
                    } else {
                        player = `<div class="text-red-500 p-3">无法解析 B站 链接</div>`;
                    }
                } else if (song.type === 'netease') {
                    const songId = parseNeteaseLink(song.link);
                    if (songId) {
                        player = `
                        <iframe 
                            src="https://music.163.com/outchain/player?type=2&id=${songId}&auto=0&height=100" 
                            width="100%" 
                            height="100" 
                            frameborder="no" 
                            scrolling="no">
                        </iframe>`;
                    } else {
                        player = `<div class="text-red-500 p-3">无法解析 网易云 链接</div>`;
                    }
                }

                html += `
                <div class="bg-white rounded-xl shadow p-6 hover:shadow-lg transition">
                    <div class="mb-3 flex items-center gap-2">
                        <span class="text-sm text-white bg-purple-500 px-2 py-1 rounded">票数：${song.voteCount}</span>
                        <span class="text-sm text-gray-500">推荐人：${song.nickname || song.UserId}</span>
                    </div>
                    <div class="text-xs text-gray-500 mb-3">
                        投票成员：加载中...
                    </div>
                    <div class="my-4 rounded-lg overflow-hidden bg-gray-50">${player}</div>
                    <div class="text-gray-700 text-sm bg-gray-50 p-3 rounded-lg mb-4">
                        ${song.reason}
                    </div>
                    <div class="flex gap-2 items-center">
                        <select id="vote_${song.id}" class="border rounded-lg px-3 py-2 flex-1">
                            ${maxVote === 1
                                ? `<option value="1">投 1 票</option>` 
                                : `
                                    <option value="1">投 1 票</option>
                                    <option value="2">投 2 票</option>
                                    <option value="3">投 3 票</option>
                                    `
                            }
                        </select>
                        <button onclick="doVote(${song.id})" class="bg-rose-500 text-white px-4 py-2 rounded-lg hover:bg-rose-600">投票</button>
                    </div>
                </div>`;
            });

            document.getElementById('songList').innerHTML = html;

            // 再异步加载投票人信息，不阻塞页面渲染
            for (let song of list) {
                const voteRes = await request(`/vote/list/${song.id}`);
                let voteText = "暂无投票";
                if (voteRes && voteRes.length > 0) {
                    voteText = voteRes.map(v => `${v.nickname}(${v.num}票)`).join(" • ");
                }
                document.querySelector(`#vote_${song.id}`).closest('.flex').parentElement.querySelector('.text-xs').innerText = `投票成员：${voteText}`;
            }
        }

        async function doVote(recId) {
            const num = parseInt(document.getElementById(`vote_${recId}`).value);
            const res = await request('/vote/do', {
                method: 'POST',
                body: JSON.stringify({ episodeId, recommendId: recId, num })
            });
            alert(res.msg);
            if (res.msg === '投票成功') location.reload();
        }
    </script>
</body>
</html>
